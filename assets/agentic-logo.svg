<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Neon Gradient -->
    <linearGradient id="g-neon" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/> <!-- Cyan -->
      <stop offset="0.5" stop-color="#818CF8"/> <!-- Indigo -->
      <stop offset="1" stop-color="#10B981"/> <!-- Emerald -->
    </linearGradient>

    <!-- Subtle Premium Glow Filter -->
    <filter id="f-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Fade Out Gradient for Connection Lines -->
    <linearGradient id="g-fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.8"/>
      <stop offset="1" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Deep Dark Professional Background -->
  <rect width="512" height="512" fill="#030712"/>
  <rect x="48" y="48" width="416" height="416" rx="108" fill="#0F172A" fill-opacity="0.5"/>
  <rect x="48" y="48" width="416" height="416" rx="108" stroke="#1E293B" stroke-width="2"/>

  <!-- Logo Monogram: AT (Agentic Track) -->
  <g filter="url(#f-glow)">
    <!-- Stylized 'A' -->
    <path d="M140 360 L240 140 H272 L372 360 H324 L308 316 H204 L188 360 H140 Z M216 276 H296 L256 188 L216 276 Z" fill="url(#g-neon)"/>
    <!-- Stylized 'T' (Integrated with A) -->
    <path d="M360 140 H480 V180 H430 V360 H382 V180 H332 V140 Z" fill="url(#g-neon)" opacity="0.9"/>
  </g>

  <!-- Data Track Elements -->
  <!-- Bottom Track -->
  <path d="M100 420 H412" stroke="url(#g-neon)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <circle cx="100" cy="420" r="6" fill="#22D3EE"/>
  <circle cx="256" cy="420" r="4" fill="#818CF8" opacity="0.8"/>
  <circle cx="412" cy="420" r="6" fill="#10B981"/>

  <!-- Top Track -->
  <path d="M100 92 H412" stroke="url(#g-neon)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <circle cx="100" cy="92" r="6" fill="#22D3EE"/>
  <circle cx="412" cy="92" r="6" fill="#10B981"/>

  <!-- Connection Nodes -->
  <circle cx="64" cy="256" r="4" fill="#22D3EE" opacity="0.4"/>
  <circle cx="448" cy="256" r="4" fill="#10B981" opacity="0.4"/>

</svg>
