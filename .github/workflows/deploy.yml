name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with deploy token
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webpage/requirements-docs.txt

      - name: Deploy to GitHub Pages
        env:
          DEPLOY_TOKEN: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}
        run: mkdocs gh-deploy --force --config-file webpage/mkdocs.yml

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read

    steps:
      - name: Delete old GitHub Pages deployments
        uses: strumwolf/delete-deployment-environment@v2
        with:
          token: ${{ secrets.MKDOCS_DEPLOY_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true