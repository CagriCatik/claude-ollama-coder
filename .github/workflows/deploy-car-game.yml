name: Deploy Car Game to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-car-game
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy car-game folder
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload car-game as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: car-game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
